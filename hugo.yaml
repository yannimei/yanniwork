  description: "HCI Researcher | MS Student | Seeking Research Internship"
  favicon: "/images/favicon.png"

  useBootstrapCDN: false
  mathjax: false
  animate: true

  theme:
    defaultTheme: "light"

  font:
    fontSize: 1rem
    fontWeight: 400
    lineHeight: 1.5
    textAlign: left

  navbar:
    align: ms-auto
    brandName: "Yanni Mei"
    disableSearch: true
    stickyNavBar:
      enable: true
      showOnScrollUp: true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: false
      disableProjects: false
